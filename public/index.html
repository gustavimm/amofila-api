<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMO FILA - Painel Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="som-notificacao" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="container-principal">
        <img src="logo-amo.png" alt="AMO INTERNET" id="logo-header">
    
        <div id="card-fila">
            <h1>PAINEL DE VENDAS</h1>
            <div id="painel-vez">
                <p>Sincronizando fila...</p>
            </div>

            <button id="btn-reordenar" onclick="reordenarFila()" style="background:none; border: 1px solid #444; color:#888; margin-top:20px; padding:10px; border-radius:8px; cursor:pointer; font-size:0.8rem; width: 100%;">
                🔄 TROCAR INÍCIO / PULAR (ALMOÇO)
            </button>
            
            <button onclick="proximaVenda()">PEGUEI VENDA!</button>
        </div>

           <div id="log-secao" style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; text-align: left;">
        <h3 style="font-size: 0.7rem; color: #555; letter-spacing: 1.5px; margin-bottom: 15px; text-transform: uppercase;">
            Últimas Vendas
        </h3>
        <div style="max-height: 200px; overflow-y: auto; padding-right: 5px;" id="container-log">
            <ul id="lista-historico" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>
    </div>

    <div id="toast">Venda registrada! ✅</div>

    <script>
        let vendedorAnterior = "";

        function mostrarToast(texto) {
            const toast = document.getElementById("toast");
            toast.innerText = texto;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

   function atualizarHistorico() {
    fetch('/historico')
        .then(res => res.json())
        .then(dados => {
            const lista = document.getElementById('lista-historico');
            if (lista) {
                lista.innerHTML = dados.map((venda, index) => `
                    <li style="margin-bottom: 8px; padding: 8px; background: rgba(255, 255, 255, 0.03); border-left: 2px solid var(--verde-neon); border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                        <div style="line-height: 1.2;">
                            <span style="color: var(--verde-neon); font-weight: bold; font-size: 0.8rem;">${venda.nome}</span>
                            <br>
                            <span style="color: #444; font-size: 0.65rem;">${venda.hora}</span>
                        </div>
                        
                        <button onclick="excluirVenda(${index})" style="background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 5px; opacity: 0.6; transition: 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">
                            🗑️
                        </button>
                    </li>
                `).join('');
            }
        })
        .catch(err => console.error("Erro no log:", err));
}
        function proximaVenda(){
            fetch('/proximo', {method: 'POST'})
            .then(resposta => resposta.json())
            .then(dados => {
                if (dados.success) {
                    mostrarToast("Venda registrada! ✅");
                    buscarVez(); 
                }
            })
            .catch(erro => console.error('Erro ao atualizar fila:', erro));
        }

        function buscarVez() {
            fetch('/vez')
            .then(resposta => resposta.json())
            .then(dados => {
                const painel = document.getElementById('painel-vez');

                if (vendedorAnterior !== "" && vendedorAnterior !== dados.vendedor) {
                    const som = document.getElementById('som-notificacao');
                    som.play().catch(e => console.log("Aguardando clique para liberar som..."));
                }
                
                vendedorAnterior = dados.vendedor;
                atualizarHistorico();

                painel.classList.remove('fade-in');
                void painel.offsetWidth; 
                painel.classList.add('fade-in');

                painel.innerHTML = `
                    <h2>Vez de:</h2>
                    <strong>${dados.vendedor}</strong>
                    <p class="horario-escala">Escala de ${dados.horario}</p>
                `;
            })
            .catch(erro => {
                console.error('Erro ao buscar a vez:', erro);
            });
        }

       function reordenarFila() {
    // Adiciona essa trava de segurança
    if (confirm("Você realmente deseja pular o início da fila ou trocar a ordem?")) {
        fetch('/reordenar', { method: 'POST' })
        .then(res => res.json())
        .then(dados => {
            if (dados.success) {
                buscarVez();
                mostrarToast("Ordem alterada! 🔄");
            }
        })
        .catch(err => console.error("Erro ao reordenar:", err));
    }
}
        function excluirVenda(index) {
            if (confirm("Deseja remover este registro do histórico?")) {
        fetch('/excluir-venda', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ index: index })
        })
        .then(res => res.json())
        .then(dados => {
            if (dados.success) {
                atualizarHistorico(); // Atualiza a lista na hora
                mostrarToast("Registro removido! 🗑️");
            }
        })
        .catch(err => console.error("Erro ao excluir:", err));
    }
}

        // Inicialização
        buscarVez();
        setInterval(buscarVez, 5000);
    </script>
</body>
</html>
