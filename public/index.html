<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMO FILA - Painel Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde: #00FF00;
            --verde-dim: rgba(0,255,0,0.15);
            --verde-glow: rgba(0,255,0,0.35);
            --fundo: #0a0a0a;
            --card: #111111;
            --card2: #161616;
            --borda: #222222;
            --borda-hover: #333333;
            --texto: #ffffff;
            --texto-dim: #555555;
            --texto-mid: #888888;
            --vermelho: #ff4444;
            --vermelho-dim: rgba(255,68,68,0.12);
            --amarelo: #FFD700;
            --amarelo-dim: rgba(255,215,0,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--fundo);
            font-family: 'DM Sans', sans-serif;
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 16px 80px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,255,0,0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        #logo-header {
            width: 130px;
            margin-bottom: 32px;
            filter: drop-shadow(0 0 12px rgba(0,255,0,0.25));
        }

        #painel-principal {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── CARD BASE ── */
        .card {
            background: var(--card);
            border: 1px solid var(--borda);
            border-radius: 20px;
            padding: 28px;
        }

        /* ── CARD CENTRAL: VEZ DE ── */
        #card-vez {
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #card-vez::before {
            content: '';
            position: absolute;
            top: -1px; left: 50%; transform: translateX(-50%);
            width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--verde), transparent);
            border-radius: 0 0 4px 4px;
        }

        .label-topo {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--texto-dim);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        #nome-vendedor {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--verde);
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0,255,0,0.3);
            transition: opacity 0.3s;
        }

        #horario-escala {
            font-size: 0.78rem;
            color: var(--texto-dim);
            font-family: 'DM Mono', monospace;
            margin-bottom: 28px;
        }

        /* ── BOTÃO PRINCIPAL ── */
        #btn-venda {
            width: 100%;
            padding: 18px;
            background: var(--verde);
            color: #000;
            border: none;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        #btn-venda::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }

        #btn-venda:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,255,0,0.3); }
        #btn-venda:active { transform: scale(0.98); }

        #btn-desfazer {
            background: none;
            border: none;
            color: var(--vermelho);
            font-size: 0.72rem;
            margin-top: 12px;
            cursor: pointer;
            text-decoration: underline;
            font-family: 'DM Sans', sans-serif;
            opacity: 0.7;
            transition: opacity 0.2s;
            display: block;
            width: 100%;
            text-align: center;
        }
        #btn-desfazer:hover { opacity: 1; }

        /* ── FILA VISÍVEL ── */
        #card-fila {
            padding: 20px 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .card-titulo {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 2.5px;
            color: var(--texto-dim);
            text-transform: uppercase;
        }

        #lista-fila {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .item-fila {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .item-fila.atual {
            background: var(--verde-dim);
            border: 1px solid rgba(0,255,0,0.2);
        }

        .item-fila.proximo {
            background: var(--card2);
        }

        .item-fila.outro {
            opacity: 0.45;
        }

        .posicao-badge {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 500;
        }

        .item-fila.atual .posicao-badge {
            background: var(--verde);
            color: #000;
        }

        .item-fila:not(.atual) .posicao-badge {
            background: var(--borda);
            color: var(--texto-mid);
        }

        .nome-fila {
            font-size: 0.88rem;
            font-weight: 500;
            flex: 1;
        }

        .item-fila.atual .nome-fila { color: var(--verde); }

        .tag-vez {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: #000;
            background: var(--verde);
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* ── PLACAR ── */
        #card-placar {
            padding: 20px 24px;
        }

        #lista-placar {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .item-placar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            background: var(--card2);
            transition: background 0.2s;
        }

        .item-placar.lider {
            background: var(--amarelo-dim);
            border: 1px solid rgba(255,215,0,0.15);
        }

        .rank-num {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--texto-dim);
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .item-placar.lider .rank-num { color: var(--amarelo); }

        .nome-placar {
            font-size: 0.85rem;
            font-weight: 500;
            flex: 1;
        }

        .item-placar.lider .nome-placar { color: var(--amarelo); }

        .barra-wrap {
            flex: 2;
            height: 4px;
            background: var(--borda);
            border-radius: 99px;
            overflow: hidden;
        }

        .barra-fill {
            height: 100%;
            border-radius: 99px;
            background: var(--texto-dim);
            transition: width 0.5s ease;
        }

        .item-placar.lider .barra-fill { background: var(--amarelo); }

        .contagem {
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--texto-mid);
            min-width: 20px;
            text-align: right;
        }

        .item-placar.lider .contagem { color: var(--amarelo); }

        .placar-vazio {
            font-size: 0.8rem;
            color: var(--texto-dim);
            text-align: center;
            padding: 12px 0;
            font-family: 'DM Mono', monospace;
        }

        /* ── CONFIG ORDEM ── */
        #card-config {
            padding: 16px 20px;
        }

        #btn-config {
            width: 100%;
            background: none;
            border: 1px solid var(--borda);
            color: var(--texto-dim);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.78rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #btn-config:hover {
            border-color: var(--borda-hover);
            color: var(--texto-mid);
        }

        #painel-ordem {
            display: none;
            margin-top: 14px;
        }

        .label-config {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--texto-dim);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        #lista-ordem-editavel {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }

        #lista-ordem-editavel li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card2);
            border: 1px solid var(--borda);
            padding: 8px 12px;
            border-radius: 8px;
        }

        #lista-ordem-editavel li span {
            font-size: 0.82rem;
            color: var(--texto);
        }

        #lista-ordem-editavel li button {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--texto-mid);
            width: auto;
            padding: 0 3px;
            margin: 0;
            min-height: unset;
            transition: color 0.15s;
        }

        #lista-ordem-editavel li button:hover { color: var(--texto); transform: none; box-shadow: none; }

        .btns-config {
            display: flex;
            gap: 8px;
        }

        .btn-salvar-config {
            flex: 1;
            padding: 10px;
            background: var(--verde);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: opacity 0.2s;
        }

        .btn-salvar-config:hover { opacity: 0.85; transform: none; box-shadow: none; }

        .btn-cancel-config {
            flex: 1;
            padding: 10px;
            background: var(--borda);
            color: var(--texto-mid);
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
        }

        .btn-cancel-config:hover { background: var(--borda-hover); transform: none; box-shadow: none; }

        /* ── HISTÓRICO ── */
        #card-historico { padding: 20px 24px; }

        #lista-historico {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
        }

        #lista-historico::-webkit-scrollbar { width: 3px; }
        #lista-historico::-webkit-scrollbar-track { background: transparent; }
        #lista-historico::-webkit-scrollbar-thumb { background: var(--borda-hover); border-radius: 99px; }

        .item-historico {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--card2);
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hist-info { display: flex; flex-direction: column; gap: 1px; }

        .hist-nome {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--verde);
        }

        .hist-hora {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            color: var(--texto-dim);
        }

        .btn-excluir-hist {
            width: 26px !important;
            height: 26px;
            background: var(--vermelho-dim) !important;
            border: 1px solid rgba(255,68,68,0.2) !important;
            border-radius: 6px !important;
            color: var(--vermelho) !important;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s !important;
            flex-shrink: 0;
            min-height: unset !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        .btn-excluir-hist:hover {
            background: rgba(255,68,68,0.25) !important;
            transform: none !important;
            box-shadow: none !important;
        }

        .historico-vazio {
            font-size: 0.78rem;
            color: var(--texto-dim);
            text-align: center;
            padding: 16px 0;
            font-family: 'DM Mono', monospace;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            border: 1px solid rgba(0,255,0,0.25);
            color: var(--verde);
            padding: 12px 24px;
            border-radius: 99px;
            font-size: 0.82rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            z-index: 99;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── FADE IN DA VEZ ── */
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<audio id="som-notificacao" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<img src="logo-amo.png" alt="AMO INTERNET" id="logo-header">

<div id="painel-principal">

    <!-- CARD PRINCIPAL: VEZ -->
    <div class="card" id="card-vez">
        <p class="label-topo">vez de vender</p>
        <div id="painel-vez">
            <div id="nome-vendedor">—</div>
            <p id="horario-escala">sincronizando...</p>
        </div>
        <button id="btn-venda" onclick="proximaVenda()">PEGUEI VENDA!</button>
        <button id="btn-desfazer" onclick="voltarVez()">⏪ Cliquei errado — desfazer última venda</button>
    </div>

    <!-- FILA VISÍVEL -->
    <div class="card" id="card-fila">
        <div class="card-header">
            <span class="card-titulo">fila de vez</span>
        </div>
        <div id="lista-fila">
            <p class="placar-vazio">carregando fila...</p>
        </div>
    </div>

    <!-- PLACAR DO DIA -->
    <div class="card" id="card-placar">
        <div class="card-header">
            <span class="card-titulo">placar do dia</span>
        </div>
        <div id="lista-placar">
            <p class="placar-vazio">nenhuma venda ainda hoje</p>
        </div>
    </div>

    <!-- CONFIG ORDEM -->
    <div class="card" id="card-config">
        <button id="btn-config" onclick="abrirConfigOrdem()">
            ⚙️ definir ordem exata da fila
        </button>
        <div id="painel-ordem">
            <span class="label-config">Arraste ou use as setas para organizar</span>
            <ul id="lista-ordem-editavel"></ul>
            <div class="btns-config">
                <button class="btn-salvar-config" onclick="salvarOrdemExata()">✅ Salvar</button>
                <button class="btn-cancel-config" onclick="fecharConfigOrdem()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- HISTÓRICO -->
    <div class="card" id="card-historico">
        <div class="card-header">
            <span class="card-titulo">últimas vendas</span>
        </div>
        <ul id="lista-historico"></ul>
    </div>

</div>

<div id="toast"></div>

<script>
    let vendedorAnterior = "";
    let filaEditavel = [];
    let historicoLocal = [];

    function mostrarToast(texto) {
        const toast = document.getElementById("toast");
        toast.innerText = texto;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2800);
    }

    function atualizarPlacar(historico) {
        const contagem = {};
        historico.forEach(v => {
            contagem[v.nome] = (contagem[v.nome] || 0) + 1;
        });

        const lista = document.getElementById('lista-placar');

        if (Object.keys(contagem).length === 0) {
            lista.innerHTML = '<p class="placar-vazio">nenhuma venda ainda hoje</p>';
            return;
        }

        const ordenado = Object.entries(contagem).sort((a, b) => b[1] - a[1]);
        const max = ordenado[0][1];

        lista.innerHTML = ordenado.map(([nome, qtd], i) => `
            <div class="item-placar ${i === 0 ? 'lider' : ''}">
                <span class="rank-num">${i + 1}º</span>
                <span class="nome-placar">${nome}</span>
                <div class="barra-wrap">
                    <div class="barra-fill" style="width: ${Math.round((qtd / max) * 100)}%"></div>
                </div>
                <span class="contagem">${qtd}</span>
            </div>
        `).join('');
    }

    function atualizarHistorico() {
        fetch('/historico')
            .then(res => res.json())
            .then(dados => {
                historicoLocal = dados;
                atualizarPlacar(dados);

                const lista = document.getElementById('lista-historico');
                if (dados.length === 0) {
                    lista.innerHTML = '<p class="historico-vazio">sem registros ainda</p>';
                    return;
                }
                lista.innerHTML = dados.map((venda, i) => `
                    <li class="item-historico">
                        <div class="hist-info">
                            <span class="hist-nome">${venda.nome}</span>
                            <span class="hist-hora">${venda.hora}</span>
                        </div>
                        <button class="btn-excluir-hist" onclick="excluirVenda(${i})" title="Remover">&times;</button>
                    </li>
                `).join('');
            })
            .catch(err => console.error("Erro no histórico:", err));
    }

    function atualizarFilaVisivel(filaAtual, vendedorAtual) {
        const container = document.getElementById('lista-fila');
        if (!filaAtual || filaAtual.length === 0) {
            container.innerHTML = '<p class="placar-vazio">fila não disponível</p>';
            return;
        }

        const indexAtual = filaAtual.indexOf(vendedorAtual);
        const reordenada = indexAtual !== -1
            ? [...filaAtual.slice(indexAtual), ...filaAtual.slice(0, indexAtual)]
            : filaAtual;

        container.innerHTML = reordenada.map((nome, i) => {
            let classe = i === 0 ? 'atual' : i === 1 ? 'proximo' : 'outro';
            return `
                <div class="item-fila ${classe}">
                    <div class="posicao-badge">${i + 1}</div>
                    <span class="nome-fila">${nome}</span>
                    ${i === 0 ? '<span class="tag-vez">agora</span>' : ''}
                </div>
            `;
        }).join('');
    }

    function buscarVez() {
        fetch('/vez')
            .then(res => res.json())
            .then(dados => {
                if (vendedorAnterior !== "" && vendedorAnterior !== dados.vendedor) {
                    document.getElementById('som-notificacao').play().catch(() => {});
                }
                vendedorAnterior = dados.vendedor;

                const nomeEl = document.getElementById('nome-vendedor');
                nomeEl.classList.remove('fade-in');
                void nomeEl.offsetWidth;
                nomeEl.classList.add('fade-in');
                nomeEl.textContent = dados.vendedor;
                document.getElementById('horario-escala').textContent = `Escala das ${dados.horario}`;

                atualizarFilaVisivel(dados.filaAtual, dados.vendedor);

                if (dados.filaAtual && document.getElementById('painel-ordem').style.display === 'none') {
                    filaEditavel = [...dados.filaAtual];
                }

                atualizarHistorico();
            })
            .catch(err => console.error('Erro ao buscar vez:', err));
    }

    function proximaVenda() {
        fetch('/proximo', { method: 'POST' })
            .then(res => res.json())
            .then(dados => {
                if (dados.success) {
                    mostrarToast("Venda registrada! ✅");
                    buscarVez();
                }
            })
            .catch(err => console.error('Erro:', err));
    }

    function voltarVez() {
        if (confirm("🚨 Isso vai apagar a última venda e devolver a vez. Tem certeza?")) {
            fetch('/voltar-vez', { method: 'POST' })
                .then(res => res.json())
                .then(dados => {
                    if (dados.success) {
                        mostrarToast("Vez desfeita! ⏪");
                        buscarVez();
                    } else {
                        alert("Não é possível voltar mais.");
                    }
                })
                .catch(err => console.error('Erro:', err));
        }
    }

    function excluirVenda(index) {
        if (confirm("Remover este registro do histórico?")) {
            fetch('/excluir-venda', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index })
            })
            .then(res => res.json())
            .then(dados => {
                if (dados.success) {
                    atualizarHistorico();
                    mostrarToast("Registro removido! 🗑️");
                }
            });
        }
    }

    function abrirConfigOrdem() {
        fetch('/vez')
            .then(res => res.json())
            .then(dados => {
                if (dados.filaAtual) {
                    const idx = dados.filaAtual.indexOf(dados.vendedor);
                    filaEditavel = idx !== -1
                        ? [...dados.filaAtual.slice(idx), ...dados.filaAtual.slice(0, idx)]
                        : [...dados.filaAtual];
                    document.getElementById('painel-ordem').style.display = 'block';
                    renderizarListaEdicao();
                }
            });
    }

    function fecharConfigOrdem() {
        document.getElementById('painel-ordem').style.display = 'none';
    }

    function renderizarListaEdicao() {
        const ul = document.getElementById('lista-ordem-editavel');
        ul.innerHTML = filaEditavel.map((nome, i) => `
            <li>
                <span><strong>${i + 1}º</strong> — ${nome}</span>
                <div style="display:flex;gap:4px;">
                    <button onclick="moverCima(${i})" ${i === 0 ? 'disabled style="opacity:0.2"' : ''}>🔼</button>
                    <button onclick="moverBaixo(${i})" ${i === filaEditavel.length - 1 ? 'disabled style="opacity:0.2"' : ''}>🔽</button>
                </div>
            </li>
        `).join('');
    }

    function moverCima(i) {
        if (i > 0) {
            [filaEditavel[i - 1], filaEditavel[i]] = [filaEditavel[i], filaEditavel[i - 1]];
            renderizarListaEdicao();
        }
    }

    function moverBaixo(i) {
        if (i < filaEditavel.length - 1) {
            [filaEditavel[i + 1], filaEditavel[i]] = [filaEditavel[i], filaEditavel[i + 1]];
            renderizarListaEdicao();
        }
    }

    function salvarOrdemExata() {
        if (confirm("Confirmar esta nova ordem?")) {
            fetch('/salvar-ordem-exata', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ novaOrdem: filaEditavel })
            })
            .then(res => res.json())
            .then(dados => {
                if (dados.success) {
                    buscarVez();
                    fecharConfigOrdem();
                    mostrarToast("Fila organizada! ✅");
                }
            });
        }
    }

    buscarVez();
    setInterval(buscarVez, 5000);
</script>
</body>
</html>
