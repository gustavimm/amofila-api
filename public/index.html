<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMO FILA API</title>
</head>
<body>

    <h1>Painel de Vendas - AMO INTERNET</h1>
    <div id="painel-vez">
        <p>Carregando quem está na vez...</p>
    </div>

    <button onclick="proximaVenda()">Peguei Venda!</button>
    

    <script>
       function proximaVenda(){
        // 1. Fetch leva o aviso de que a venda foi pega para o servidor
        fetch('/proximo', {method: 'POST'})
        .then(resposta => resposta.json())
        .then(dados =>{
            console.log('Venda atualizada:', dados);
            buscarVez(); // Atualiza o painel com a nova vez
        })

        .catch(erro => console.error('Erro ao atualizar fila:', erro));
       }

        // Função para buscar quem está na vez na API

        function buscarVez(){
            // O fetch vai até a nossa rota que criamos no server.js
            fetch ('/vez')
            .then(resposta => resposta.json()) // Converte a resposta para JSON
            .then(dados => {
                // Atualizamos o conteúdo do div com o nome da pessoa que está na vez
                const painel = document.getElementById('painel-vez');
                painel.innerHTML = `<h2> Vez de: <strong> ${dados.vendedor}</strong> </h2>
                <p>Horário atual da escala: ${dados.horario}h</p>`;
                
            })

            .catch(erro => console.error('Erro ao buscar a vez:', erro));
        }

        // 3. Executando a função para buscar a vez quando a página carregar
        buscarVez();
    </script>
    
</body>
</html>
